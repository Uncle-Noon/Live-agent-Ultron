<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Ultron Live Agent - Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      --bg: #050816;
      --bg-elevated: #0f172a;
      --accent: #22c55e;
      --accent-soft: rgba(34, 197, 94, 0.15);
      --border: rgba(148, 163, 184, 0.3);
      --text: #e5e7eb;
      --text-muted: #9ca3af;
      --error: #f87171;
      --shadow-soft: 0 18px 45px rgba(15, 23, 42, 0.8);
      --radius-lg: 18px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
        "Segoe UI", sans-serif;
      background: radial-gradient(circle at top left, #1f2933 0, #020617 40%),
        radial-gradient(circle at bottom right, #0f766e 0, #020617 55%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
      position: relative;
    }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -50px) scale(1.1); }
      66% { transform: translate(-20px, 20px) scale(0.9); }
      100% { transform: translate(0, 0) scale(1); }
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(30px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .circles {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      overflow: hidden;
      z-index: 0;
    }

    .circle {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
      opacity: 0.3;
      filter: blur(45px);
      animation: float 20s infinite ease-in-out;
    }

    .circle-1 {
      width: 450px; height: 450px;
      top: -120px; left: -120px;
      animation-duration: 25s;
    }

    .circle-2 {
      width: 350px; height: 350px;
      bottom: -100px; right: -100px;
      background: radial-gradient(circle, #3b82f6 0%, transparent 70%);
      animation-duration: 20s;
      animation-delay: -5s;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: radial-gradient(circle at top left, #111827 0, #020617 55%);
      border-radius: 24px;
      border: 1px solid rgba(148, 163, 184, 0.45);
      box-shadow: var(--shadow-soft);
      padding: 24px 22px 22px;
      position: relative;
      z-index: 10;
      animation: slideIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .title {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 0.04em;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    input[type="email"] {
      width: 100%;
      padding: 10px 11px;
      border-radius: 11px;
      border: 1px solid rgba(55, 65, 81, 0.9);
      background: rgba(15, 23, 42, 0.95);
      color: var(--text);
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease,
        background 0.15s ease;
    }

    input::placeholder {
      color: rgba(148, 163, 184, 0.7);
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent-soft);
      background: rgba(15, 23, 42, 0.98);
    }

    button {
      margin-top: 14px;
      width: 100%;
      border: none;
      outline: none;
      cursor: pointer;
      border-radius: 999px;
      padding: 11px 18px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: linear-gradient(135deg,
          var(--accent),
          #16a34a,
          #22c55e,
          #3b82f6);
      background-size: 200% auto;
      color: #022c22;
      box-shadow: 0 10px 25px rgba(34, 197, 94, 0.35);
      border: 1px solid rgba(22, 163, 74, 0.9);
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    button:hover {
      background-position: right center;
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 14px 30px rgba(34, 197, 94, 0.5);
    }

    button:active {
      transform: translateY(1px) scale(0.98);
      box-shadow: 0 5px 15px rgba(34, 197, 94, 0.3);
    }

    button:disabled {
      opacity: 0.6;
      cursor: default;
      box-shadow: none;
    }

    .hint {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 8px;
    }

    .error {
      margin-top: 6px;
      font-size: 12px;
      color: var(--error);
    }

    .status {
      margin-top: 6px;
      font-size: 12px;
      color: var(--text-muted);
    }
  </style>
</head>

<body>
  <div class="circles">
    <div class="circle circle-1"></div>
    <div class="circle circle-2"></div>
  </div>
  <div class="card">
    <div class="title">Welcome to Ultron Live Agent</div>
    <div class="subtitle">
      Sign in with your Gmail address so your prompts and chat history can be
      saved under your account.
    </div>

    <form id="loginForm">
      <label for="email">Gmail address</label>
      <input id="email" type="email" name="email" required placeholder="you@example.com" />
      <button type="submit" id="loginBtn">Continue</button>
      <div class="hint">
        Your chat will be saved under this Gmail id. Logging in
        again with the same Gmail id will restore your previous chats.
      </div>
      <div id="error" class="error" style="display: none"></div>
      <div id="status" class="status"></div>
    </form>
  </div>

  <script>
    const form = document.getElementById("loginForm");
    const emailInput = document.getElementById("email");
    const errorEl = document.getElementById("error");
    const statusEl = document.getElementById("status");
    const loginBtn = document.getElementById("loginBtn");

    const API_LOGIN_URL = "http://localhost:3000/api/login";
    const EMAIL_STORAGE_KEY = "ultronEmail";

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      errorEl.style.display = "none";
      errorEl.textContent = "";
      statusEl.textContent = "";

      const email = (emailInput.value || "").trim();
      if (!email) {
        errorEl.textContent = "Please enter your Gmail address.";
        errorEl.style.display = "block";
        return;
      }

      loginBtn.disabled = true;
      statusEl.textContent = "Signing you in…";

      try {
        const res = await fetch(API_LOGIN_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email }),
        });

        const data = await res.json();

        if (!res.ok || !data.success) {
          const msg =
            (data && data.error) ||
            `Login failed with status ${res.status}. Please try again.`;
          throw new Error(msg);
        }

        // Persist email for the chat UI
        try {
          localStorage.setItem(EMAIL_STORAGE_KEY, data.email || email);
        } catch (err) {
          console.warn("Failed to save email in localStorage", err);
        }

        // Navigate to the chat UI in this window (login page effectively closes)
        window.location.href = "/";
      } catch (err) {
        console.error(err);
        errorEl.textContent =
          err && err.message
            ? err.message
            : "Something went wrong while logging in.";
        errorEl.style.display = "block";
      } finally {
        loginBtn.disabled = false;
        statusEl.textContent = "";
      }
    });
  </script>
</body>

</html>
