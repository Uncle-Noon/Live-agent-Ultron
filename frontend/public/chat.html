<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Ultron Live Agent — AI-powered personal assistant chat" />
  <title>Ultron Live Agent — Chat</title>

  <link rel="stylesheet" href="/css/variables.css" />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/animations.css" />
  <link rel="stylesheet" href="/css/layout.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/chat.css" />
</head>
<body>
  <div class="shell">

    <!-- ── Header ── -->
    <header class="shell-header">
      <div class="traffic-lights">
        <span class="dot red"></span>
        <span class="dot amber"></span>
        <span class="dot green"></span>
      </div>
      <div class="shell-title">Ultron Live Agent</div>
      <div class="header-actions">
        <button type="button" class="btn-secondary" id="switchBtn"
                style="padding:6px 12px;font-size:11px;font-weight:600">
          Switch Account
        </button>
        <div class="badge">
          <span class="badge-dot"></span>
          <span>Online</span>
        </div>
      </div>
    </header>

    <div class="main">

      <!-- ── Chat panel ── -->
      <section class="panel">
        <div class="panel-heading">
          <div>
            <div class="panel-title">Chat</div>
            <div class="panel-subtitle">Your conversation with Ultron</div>
          </div>
        </div>
        <div class="message-list" id="messageList" role="log" aria-live="polite">
          <div class="empty-state">No messages yet. Ask anything!</div>
        </div>
      </section>

      <!-- ── Input & Commands panel ── -->
      <section class="panel">
        <div class="panel-heading">
          <div>
            <div class="panel-title">Send a message</div>
          </div>
        </div>

        <form id="chatForm" class="form" novalidate>
          <!-- Message textarea -->
          <div class="field">
            <div class="field-label">
              <span>Message</span>
              <span class="char-counter" id="charCounter">0 / 4000</span>
            </div>
            <textarea id="messageInput" rows="3"
              placeholder="Ask Ultron anything…" autocomplete="off"></textarea>
            <div id="error" class="error" style="display:none" role="alert"></div>
          </div>

          <!-- Attachment Preview (Image or File) -->
          <div class="attachment-preview" id="attachmentPreview" style="display:none">
            <div id="filePreview" style="display:none;align-items:center;gap:8px">
              <span class="btn-icon">📎</span>
              <span id="fileName" style="font-size:12px;color:var(--text-muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">No file selected</span>
              <button type="button" class="btn-clear" id="clearFileBtn" aria-label="Remove file">✕</button>
            </div>
            <div id="imagePreview" style="display:none;align-items:center;gap:12px">
              <div class="thumbnail-wrapper">
                <img id="heldImageThumb" src="" alt="Captured snapshot" />
              </div>
              <span style="font-size:12px;color:var(--text-muted)">Image captured. Ready to send.</span>
              <button type="button" class="btn-clear" id="clearImgBtn" aria-label="Remove image">✕</button>
            </div>
          </div>

          <input type="file" id="fileInput" style="display:none" aria-label="File attachment" />

          <!-- Controls row -->
          <div class="controls-container">
            <!-- Row 0: Status -->
            <div class="status-label" style="margin-bottom: 4px;">
              <span class="status-dot ok" id="statusDot"></span>
              <span id="statusText">Idle</span>
            </div>

            <!-- Row 1: Attachments -->
            <div class="controls-row">
              <button type="button" class="btn-camera" id="cameraBtn" title="Let Ultron see via camera">
                <span class="btn-icon">📷</span>
                <span>Camera</span>
              </button>
              <button type="button" class="btn-secondary" onclick="document.getElementById('fileInput').click()" 
                      style="padding:8px 12px;font-size:12px" title="Upload a file for analysis">
                <span class="btn-icon">📎</span>
                <span>Upload</span>
              </button>
            </div>

            <!-- Row 2: Main Actions -->
            <div class="controls-row main-actions">
              <button type="button" class="btn-mic" id="micBtn" aria-label="Voice input" title="Voice input (Speech-to-Text)">
                <span class="btn-icon">🎤</span>
                <span id="micText">Speak</span>
              </button>
              <button type="button" class="btn-secondary" id="clearBtn" title="Clear all chat history">
                <span class="btn-icon">✕</span> Clear
              </button>
              <button type="button" class="btn-stop" id="stopBtn" style="display:none" aria-label="Stop AI response">
                <span class="btn-icon">⏹</span> Stop
              </button>
              <button type="submit" class="btn-primary" id="sendBtn">
                <span class="btn-icon">➤</span> Send
              </button>
            </div>
          </div>
        </form>

        <!-- ── Quick commands ── -->
        <div style="margin-top:20px">
          <div class="panel-heading" style="margin-bottom:8px">
            <div>
              <div class="panel-title">Quick commands</div>
              <div class="panel-subtitle">Type a keyword to trigger an action</div>
            </div>
          </div>
          <div class="hint">Try: <code>open youtube</code> or add your own below.</div>
          <div class="message-list" id="commandList" style="max-height:160px"></div>

          <form id="commandForm" class="form" style="margin-top:12px" novalidate>
            <div class="field-row">
              <div class="field">
                <label class="field-label" for="commandKeyword">Keyword</label>
                <input id="commandKeyword" type="text" placeholder="e.g. open maps" autocomplete="off" />
              </div>
              <div class="field">
                <label class="field-label" for="commandUrl">URL</label>
                <input id="commandUrl" type="text" placeholder="https://maps.google.com" autocomplete="off" />
              </div>
            </div>
            <div style="display:flex;justify-content:flex-end">
              <button type="submit" class="btn-secondary" style="padding:8px 14px">Add command</button>
            </div>
            <div id="commandError" class="error" style="display:none" role="alert"></div>
          </form>
        </div>
      </section>

    </div><!-- .main -->
  </div><!-- .shell -->

  <!-- ── Camera Preview Modal ── -->
  <div id="cameraModal" class="modal-overlay" style="display:none">
    <div class="modal-content camera-modal">
      <div class="modal-header">
        <div class="modal-title">Camera Preview</div>
        <button type="button" class="modal-close" id="closeCameraBtn">✕</button>
      </div>
      <div class="camera-preview-container">
        <video id="cameraVideo" autoplay playsinline></video>
        <canvas id="cameraCanvas" style="display:none"></canvas>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn-secondary" id="cancelCameraBtn">Cancel</button>
        <button type="button" class="btn-primary" id="captureBtn">
          <span class="btn-icon">📷</span> Capture Frame
        </button>
      </div>
    </div>
  </div>

  <script type="module" src="/js/chat.js"></script>
</body>
</html>
